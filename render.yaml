services:
  - type: web
    name: rag-knowledge-assistant-api
    env: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    envVars:
      - key: RAG_HOST
        value: 0.0.0.0
      - key: RAG_STORAGE_PATH
        value: /var/data/rag-index.json
      - key: RAG_ALLOWED_ORIGINS
        value: https://<YOUR_FRONTEND_ORIGIN>
      - key: RAG_API_KEY
        sync: false

  - type: web
    env: static
    name: rag-knowledge-assistant-ui
    staticPublishPath: dist
    buildCommand: |
      mkdir -p dist
      cp -R ui/. dist/
      sed -i "s|__VITE_API_BASE_URL__|${VITE_API_BASE_URL}|g" dist/index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://<YOUR_BACKEND_URL>
